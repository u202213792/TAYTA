# Configuración de PRODUCCIÓN (Render) — SIN secretos.
# Todos los valores sensibles llegan por variables de entorno.
spring.application.name=tayta
server.port=${PORT:8080}

# Base de datos (definir en Render)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.data-rest.enabled=false

# JWT (definir JWT_SECRET en Render)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

logging.level.org.springframework.security=WARN
